syntax = "proto3";

package capsaicin;

option go_package = "github.com/capsaicin/scanner/internal/cluster/proto";

// CapsaicinService is the gRPC service for distributed scanning coordination.
service CapsaicinService {
  // SubmitChunk sends a batch of scan tasks from master to agent.
  rpc SubmitChunk(ScanChunk) returns (ChunkAck);
  
  // StreamResults is a server-streaming RPC where agents stream findings back.
  rpc StreamResults(AgentID) returns (stream ScanFinding);
  
  // Heartbeat is used by agents to report health status.
  rpc Heartbeat(AgentStatus) returns (HeartbeatAck);
  
  // GetChunk is called by agents to pull the next work chunk (pull model).
  rpc GetChunk(ChunkRequest) returns (ScanChunk);
  
  // ReportResult sends a single finding from agent to master.
  rpc ReportResult(ScanFinding) returns (ResultAck);
}

// ScanChunk represents a batch of scan tasks distributed to an agent.
message ScanChunk {
  string chunk_id = 1;
  string target_url = 2;
  repeated string words = 3;
  repeated string extensions = 4;
  int32 depth = 5;
  ScanConfig config = 6;
}

// ScanConfig contains the scan parameters for the agent.
message ScanConfig {
  int32 threads = 1;
  int32 rate_limit = 2;
  int32 timeout_seconds = 3;
  int32 retry_attempts = 4;
  bool safe_mode = 5;
  string jitter_profile = 6;
  string tls_impersonate = 7;
  bool force_http2 = 8;
  map<string, string> custom_headers = 9;
}

// ScanFinding represents a single discovery made by an agent.
message ScanFinding {
  string agent_id = 1;
  string chunk_id = 2;
  string url = 3;
  int32 status_code = 4;
  int32 size = 5;
  string method = 6;
  string severity = 7;
  string confidence = 8;
  repeated string tags = 9;
  bool secret_found = 10;
  repeated string secret_types = 11;
  string waf_detected = 12;
  string timestamp = 13;
  string server = 14;
}

// AgentID identifies a remote scanning agent.
message AgentID {
  string id = 1;
}

// AgentStatus is sent periodically by agents as a heartbeat.
message AgentStatus {
  string agent_id = 1;
  int64 processed = 2;
  int64 found = 3;
  int64 errors = 4;
  double cpu_usage = 5;
  double memory_mb = 6;
  string current_url = 7;
  bool alive = 8;
}

// ChunkRequest is sent by agents to pull work.
message ChunkRequest {
  string agent_id = 1;
  int32 max_words = 2; // maximum words the agent wants in this chunk
}

// Acknowledgment messages.
message ChunkAck {
  bool accepted = 1;
  string message = 2;
}

message HeartbeatAck {
  bool ok = 1;
  string command = 2; // "continue", "pause", "shutdown"
}

message ResultAck {
  bool accepted = 1;
}
